<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학부모 확인 — 단원평가 결과</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="quiz_data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-dark: #0F6E56;
    --red-light: #FCEBEB; --red: #E24B4A; --red-dark: #791F1F;
    --green-light: #EAF3DE; --green: #639922; --green-dark: #3B6D11;
    --gray-bg: #F7F6F2; --gray-border: #E2E0D8; --gray-text: #6B6A65;
    --text: #1a1a18; --white: #ffffff; --radius: 12px; --radius-sm: 8px;
  }
  body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:var(--gray-bg); min-height:100vh; color:var(--text); }
  main { max-width:600px; margin:0 auto; padding:1.5rem 1rem 3rem; }
  .badge { display:inline-block; background:var(--teal-light); color:var(--teal-dark); font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; margin-bottom:1rem; letter-spacing:0.05em; }
  .card { background:var(--white); border-radius:var(--radius); border:1px solid var(--gray-border); padding:1.5rem; margin-bottom:1rem; }
  .result-head { text-align:center; }
  .result-head .who { font-size:14px; color:var(--gray-text); }
  .result-score { font-size:48px; font-weight:800; color:var(--teal); line-height:1; margin:0.6rem 0 2px; }
  .result-label { font-size:13px; color:var(--gray-text); }
  .section-title { font-size:15px; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; gap:6px; }
  .section-title::before { content:''; display:block; width:4px; height:16px; background:var(--teal); border-radius:2px; }
  .section-title.red::before { background:var(--red); }
  .wrong-item { padding:12px 0; border-bottom:1px solid var(--gray-border); }
  .wrong-item:last-child { border-bottom:none; }
  .wrong-q { font-size:14px; font-weight:500; margin-bottom:6px; }
  .wrong-ans { display:flex; flex-direction:column; gap:3px; font-size:13px; }
  .wrong-my { color:var(--red-dark); } .wrong-correct { color:var(--green-dark); }
  .wrong-exp { font-size:12px; color:var(--gray-text); margin-top:6px; line-height:1.5; background:var(--gray-bg); padding:8px 10px; border-radius:6px; }

  label { font-size:13px; font-weight:600; color:var(--gray-text); display:block; margin-bottom:6px; }
  textarea { width:100%; padding:10px 14px; border:1px solid var(--gray-border); border-radius:var(--radius-sm); font-size:14px; background:var(--gray-bg); color:var(--text); outline:none; resize:vertical; min-height:70px; font-family:inherit; }
  textarea:focus { border-color:var(--teal); background:var(--white); }
  .sign-wrap { position:relative; }
  canvas#pad { width:100%; height:160px; background:#fff; border:1px dashed var(--gray-border); border-radius:var(--radius-sm); touch-action:none; cursor:crosshair; }
  .sign-hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#c9c7bf; font-size:13px; pointer-events:none; }
  .row-btns { display:flex; gap:8px; margin-top:10px; }
  .btn { padding:11px 16px; border-radius:var(--radius-sm); font-size:14px; font-weight:700; cursor:pointer; border:1px solid var(--gray-border); background:var(--white); }
  .btn.ghost:hover { border-color:var(--teal); color:var(--teal); }
  .btn.primary { flex:1; background:var(--teal); color:#fff; border-color:var(--teal); }
  .btn.primary:hover { background:var(--teal-dark); }
  .msg { font-size:13px; text-align:center; margin-top:10px; color:var(--gray-text); }
  .done-box { text-align:center; padding:1rem; }
  .done-box .sig-img { max-width:240px; border:1px solid var(--gray-border); border-radius:8px; background:#fff; margin-top:8px; }
  .loading { text-align:center; padding:3rem; color:var(--gray-text); }
</style>
</head>
<body>
<main>
  <div style="text-align:center"><span class="badge" id="badge">단원평가 결과</span></div>
  <div id="content"><div class="loading">결과를 불러오는 중...</div></div>
</main>

<script>
const SUPABASE_URL = 'https://btatltsnzsvuxnvxoetv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_hyo67SXKucw_n82sHPIMYg_Ku3H1z3L';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getId(){ return new URLSearchParams(location.search).get('id'); }

let row=null, pad=null, ctx=null, drawing=false, hasDrawn=false;

async function init(){
  const id = getId();
  if(!id){ document.getElementById('content').innerHTML = '<div class="card" style="text-align:center;color:var(--red-dark)">잘못된 링크입니다. (결과 ID 없음)</div>'; return; }
  const { data, error } = await sb.from('quiz_sessions').select('*').eq('id', id).maybeSingle();
  if(error || !data){ document.getElementById('content').innerHTML = '<div class="card" style="text-align:center;color:var(--red-dark)">결과를 찾을 수 없습니다.</div>'; return; }
  row = data;
  render();
}

function render(){
  const subject = row.subject||'', unit = row.unit||'';
  document.getElementById('badge').textContent = `6학년 ${subject} · ${unit}`.trim();
  const bank = (QUIZ_BANK[subject] && QUIZ_BANK[subject][unit]) ? QUIZ_BANK[subject][unit] : null;
  const N = row.total || (bank?bank.questions.length:0);
  const pct = N>0 ? Math.round((row.score||0)/N*100) : 0;

  // 오답노트
  let wrongHtml = '';
  const wrongs = (row.answers||[]).filter(a=>!a.correct);
  if(bank){
    if(wrongs.length===0){ wrongHtml = '<div style="text-align:center;color:var(--green);font-weight:700;padding:0.5rem">🎊 오답이 없습니다!</div>'; }
    else {
      wrongHtml = wrongs.map(a=>{
        const q = bank.questions[a.q]; if(!q) return '';
        const my = (a.picked!=null && q.opts[a.picked]!=null) ? q.opts[a.picked] : '(미응답)';
        return `<div class="wrong-item">
          <div class="wrong-q">문제 ${a.q+1}. ${escapeHtml(q.q)}</div>
          <div class="wrong-ans">
            <span class="wrong-my">✗ 자녀 답: ${escapeHtml(my)}</span>
            <span class="wrong-correct">✓ 정답: ${escapeHtml(q.opts[q.ans])}</span>
          </div>
          <div class="wrong-exp">💡 ${escapeHtml(q.exp)}</div>
        </div>`;
      }).join('');
    }
  }

  const already = !!row.parent_signed_at;
  document.getElementById('content').innerHTML = `
    <div class="card result-head">
      <div class="who">${escapeHtml(row.class_name||'')} ${escapeHtml(row.student_name||'')}</div>
      <div class="result-score">${row.score||0}</div>
      <div class="result-label">${N}문제 중 · ${pct}점</div>
    </div>
    ${bank?`<div class="card"><div class="section-title red">오답노트</div>${wrongHtml}</div>`:''}
    <div class="card" id="sign-card">
      <div class="section-title">👨‍👩‍👧 학부모 확인</div>
      ${already?renderDone():renderForm()}
    </div>`;

  if(!already) setupPad();
}

function renderForm(){
  return `
    <label>한마디 (자녀에게 응원·격려의 말)</label>
    <textarea id="comment" placeholder="예) 열심히 했구나! 틀린 문제 같이 복습해보자."></textarea>
    <label style="margin-top:14px">서명 (아래 칸에 손으로 서명해 주세요)</label>
    <div class="sign-wrap">
      <canvas id="pad"></canvas>
      <div class="sign-hint" id="sign-hint">여기에 서명하세요</div>
    </div>
    <div class="row-btns">
      <button class="btn ghost" onclick="clearPad()">지우기</button>
      <button class="btn primary" onclick="submitSign()">확인 완료 ✓</button>
    </div>
    <div class="msg" id="msg"></div>`;
}

function renderDone(){
  return `
    <div class="done-box">
      <div style="color:var(--green);font-weight:700;font-size:15px">✅ 이미 확인하셨습니다</div>
      ${row.parent_comment?`<div style="font-size:14px;margin-top:10px">💬 ${escapeHtml(row.parent_comment)}</div>`:''}
      ${row.parent_signature?`<div><img class="sig-img" src="${row.parent_signature}" alt="서명"/></div>`:''}
      <div style="font-size:11px;color:var(--gray-text);margin-top:8px">${row.parent_signed_at?new Date(row.parent_signed_at).toLocaleString('ko-KR'):''}</div>
    </div>`;
}

function setupPad(){
  pad = document.getElementById('pad');
  // 캔버스 실제 해상도를 표시 크기에 맞춤
  const rect = pad.getBoundingClientRect();
  pad.width = rect.width; pad.height = rect.height;
  ctx = pad.getContext('2d');
  ctx.lineWidth = 2.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle = '#1a1a18';
  const pos = e => { const r = pad.getBoundingClientRect(); const t = e.touches?e.touches[0]:e; return {x:t.clientX-r.left, y:t.clientY-r.top}; };
  const start = e => { e.preventDefault(); drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const move = e => { if(!drawing) return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); if(!hasDrawn){hasDrawn=true; document.getElementById('sign-hint').style.display='none';} };
  const end = () => { drawing=false; };
  pad.addEventListener('mousedown',start); pad.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  pad.addEventListener('touchstart',start,{passive:false}); pad.addEventListener('touchmove',move,{passive:false}); pad.addEventListener('touchend',end);
}

function clearPad(){ if(ctx){ ctx.clearRect(0,0,pad.width,pad.height); hasDrawn=false; document.getElementById('sign-hint').style.display='block'; } }

async function submitSign(){
  const comment = document.getElementById('comment').value.trim();
  if(!hasDrawn){ document.getElementById('msg').textContent = '서명을 해주세요.'; return; }
  const msg = document.getElementById('msg');
  msg.textContent = '저장하는 중...';
  const signature = pad.toDataURL('image/png');
  try {
    const { error } = await sb.rpc('sign_result', { p_id: row.id, p_signature: signature, p_comment: comment });
    if(error) throw error;
    row.parent_signed_at = new Date().toISOString();
    row.parent_comment = comment;
    row.parent_signature = signature;
    document.getElementById('sign-card').innerHTML = '<div class="section-title">👨‍👩‍👧 학부모 확인</div>' + renderDone();
  } catch(e){
    console.error(e);
    msg.textContent = '⚠️ 저장 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
  }
}

init();
</script>
</body>
</html>
