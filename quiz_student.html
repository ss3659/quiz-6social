<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6학년 사회 1단원 단원평가</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #1D9E75; --teal-light: #E1F5EE; --teal-dark: #0F6E56;
    --red-light: #FCEBEB; --red: #E24B4A; --red-dark: #791F1F;
    --green-light: #EAF3DE; --green: #639922; --green-dark: #3B6D11;
    --gray-bg: #F7F6F2; --gray-border: #E2E0D8; --gray-text: #6B6A65;
    --text: #1a1a18; --white: #ffffff;
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--gray-bg); min-height: 100vh; color: var(--text); }

  /* 입력 화면 */
  #start-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
  .start-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-border); padding: 2.5rem 2rem; width: 100%; max-width: 420px; text-align: center; }
  .subject-badge { display:inline-block; background: var(--teal-light); color: var(--teal-dark); font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; margin-bottom:1.2rem; letter-spacing:0.05em; }
  .start-card h1 { font-size:22px; font-weight:700; margin-bottom:6px; }
  .start-card p { font-size:14px; color: var(--gray-text); margin-bottom:2rem; }
  .input-group { display:flex; flex-direction:column; gap:12px; text-align:left; margin-bottom:1.5rem; }
  label { font-size:13px; font-weight:600; color: var(--gray-text); margin-bottom:4px; display:block; }
  input[type=text], select { width:100%; padding:10px 14px; border:1px solid var(--gray-border); border-radius:var(--radius-sm); font-size:15px; background:var(--gray-bg); color:var(--text); outline:none; }
  input[type=text]:focus, select:focus { border-color: var(--teal); background: var(--white); }
  .start-btn { width:100%; background: var(--teal); color: #fff; border:none; border-radius:var(--radius-sm); padding:13px; font-size:16px; font-weight:700; cursor:pointer; transition:background 0.15s; }
  .start-btn:hover { background: var(--teal-dark); }
  .info-row { display:flex; justify-content:center; gap:1.5rem; margin-top:1.5rem; }
  .info-item { font-size:12px; color: var(--gray-text); display:flex; align-items:center; gap:4px; }

  /* 퀴즈 화면 */
  #quiz-screen { display:none; max-width:600px; margin:0 auto; padding:1.5rem 1rem 3rem; }
  .quiz-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; }
  .student-name-tag { font-size:13px; color: var(--gray-text); }
  .q-count-tag { font-size:13px; font-weight:600; color: var(--teal); }
  .progress-wrap { margin-bottom:1.5rem; }
  .progress-bg { height:6px; background: var(--gray-border); border-radius:3px; }
  .progress-fg { height:6px; background: var(--teal); border-radius:3px; transition:width 0.35s; }
  .q-card { background: var(--white); border-radius: var(--radius); border:1px solid var(--gray-border); padding:1.5rem; margin-bottom:1rem; }
  .q-num { font-size:11px; font-weight:700; color: var(--teal); letter-spacing:0.08em; margin-bottom:10px; }
  .q-text { font-size:16px; line-height:1.7; font-weight:500; margin-bottom:1.2rem; }
  .opts { display:flex; flex-direction:column; gap:10px; }
  .opt { background: var(--gray-bg); border:1px solid var(--gray-border); border-radius:var(--radius-sm); padding:12px 16px; font-size:14px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:10px; text-align:left; }
  .opt:hover:not(.disabled) { border-color: var(--teal); background: var(--teal-light); }
  .opt.selected { border-color: var(--teal); background: var(--teal-light); color: var(--teal-dark); font-weight:600; }
  .opt.correct { border-color: var(--green); background: var(--green-light); color: var(--green-dark); font-weight:600; }
  .opt.wrong { border-color: var(--red); background: var(--red-light); color: var(--red-dark); }
  .opt.disabled { cursor:default; }
  .opt-num { width:24px; height:24px; border-radius:50%; border:1.5px solid currentColor; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
  .feedback-box { margin-top:12px; padding:12px 14px; border-radius:var(--radius-sm); font-size:13px; line-height:1.6; display:none; }
  .feedback-box.show { display:block; }
  .feedback-box.correct { background: var(--green-light); color: var(--green-dark); border-left:3px solid var(--green); }
  .feedback-box.wrong { background: var(--red-light); color: var(--red-dark); border-left:3px solid var(--red); }
  .nav-row { display:flex; gap:10px; }
  .nav-btn { flex:1; padding:12px; border-radius:var(--radius-sm); border:1px solid var(--gray-border); background: var(--white); font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; }
  .nav-btn:hover:not(:disabled) { border-color: var(--teal); color: var(--teal); }
  .nav-btn:disabled { opacity:0.35; cursor:default; }
  .nav-btn.primary { background: var(--teal); color:#fff; border-color: var(--teal); }
  .nav-btn.primary:hover:not(:disabled) { background: var(--teal-dark); }

  /* 결과 화면 */
  #result-screen { display:none; max-width:600px; margin:0 auto; padding:1.5rem 1rem 3rem; }
  .result-card { background: var(--white); border-radius: var(--radius); border:1px solid var(--gray-border); padding:2rem 1.5rem; text-align:center; margin-bottom:1rem; }
  .result-score { font-size:56px; font-weight:800; color: var(--teal); line-height:1; margin:1rem 0 4px; }
  .result-label { font-size:14px; color: var(--gray-text); margin-bottom:1.5rem; }
  .result-msg { font-size:16px; font-weight:600; }
  .stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:1.5rem 0; }
  .stat-box { background: var(--gray-bg); border-radius:var(--radius-sm); padding:14px 8px; }
  .stat-num { font-size:22px; font-weight:700; }
  .stat-txt { font-size:11px; color: var(--gray-text); margin-top:2px; }
  .wrong-section { background: var(--white); border-radius: var(--radius); border:1px solid var(--gray-border); padding:1.5rem; margin-bottom:1rem; }
  .wrong-title { font-size:15px; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; gap:6px; }
  .wrong-title::before { content:''; display:block; width:4px; height:16px; background: var(--red); border-radius:2px; }
  .wrong-item { padding:14px 0; border-bottom:1px solid var(--gray-border); }
  .wrong-item:last-child { border-bottom:none; }
  .wrong-q { font-size:14px; font-weight:500; margin-bottom:8px; }
  .wrong-ans { display:flex; flex-direction:column; gap:4px; font-size:13px; }
  .wrong-my { color: var(--red-dark); } .wrong-correct { color: var(--green-dark); }
  .wrong-exp { font-size:12px; color: var(--gray-text); margin-top:6px; line-height:1.5; background: var(--gray-bg); padding:8px 10px; border-radius:6px; }
  .submit-msg { font-size:13px; color: var(--gray-text); text-align:center; margin-top:8px; }
  .loader { text-align:center; padding:1rem; color: var(--gray-text); font-size:14px; }
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="start-screen">
  <div class="start-card">
    <div class="subject-badge">6학년 사회 1단원</div>
    <h1>우리나라의 정치 발전</h1>
    <p>단원평가 · 20문제 · 제한시간 없음</p>
    <div class="input-group">
      <div>
        <label>이름</label>
        <input type="text" id="name-input" placeholder="홍길동" maxlength="10">
      </div>
      <div>
        <label>반</label>
        <select id="class-input">
          <option value="">선택하세요</option>
          <option>1반</option><option>2반</option><option>3반</option>
          <option>4반</option><option>5반</option><option>6반</option>
        </select>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">시험 시작하기 →</button>
    <div class="info-row">
      <span class="info-item">📝 20문제</span>
      <span class="info-item">✅ 즉시 채점</span>
      <span class="info-item">📊 오답노트 제공</span>
    </div>
  </div>
</div>

<!-- 퀴즈 화면 -->
<div id="quiz-screen">
  <div class="quiz-top">
    <span class="student-name-tag" id="name-display"></span>
    <span class="q-count-tag" id="q-count"></span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bg"><div class="progress-fg" id="pbar"></div></div>
  </div>
  <div class="q-card">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="opts" id="opts"></div>
    <div class="feedback-box" id="fb"></div>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)">← 이전</button>
    <button class="nav-btn primary" id="next-btn" onclick="go(1)">다음 →</button>
  </div>
</div>

<!-- 결과 화면 -->
<div id="result-screen">
  <div class="result-card">
    <div style="font-size:13px;color:var(--gray-text)" id="res-name"></div>
    <div class="result-score" id="res-score"></div>
    <div class="result-label">20문제 중</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="stat-correct" style="color:var(--green)"></div><div class="stat-txt">정답</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-wrong" style="color:var(--red)"></div><div class="stat-txt">오답</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-pct" style="color:var(--teal)"></div><div class="stat-txt">점수</div></div>
    </div>
    <div class="result-msg" id="res-msg"></div>
  </div>
  <div class="wrong-section" id="wrong-section"></div>
  <div class="submit-msg" id="submit-msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://vfhziwnsiverbktrchyr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmaHppd25zaXZlcmJrdHJjaHlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzQ4ODYsImV4cCI6MjA5NzAxMDg4Nn0.ZMgfEVfwAUltE01gBdXpzkgZd0j4eX-UFLSuxp4XzYM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QS = [
  {q:"민주주의의 기본 원리 중 국민이 나라의 주인이라는 원리를 무엇이라 하는가?",opts:["국민 주권","법치주의","권력 분립","기본권 보장"],ans:0,exp:"국민 주권은 나라의 주인이 국민임을 뜻하는 민주주의의 핵심 원리입니다."},
  {q:"4·19 혁명이 일어난 해는?",opts:["1948년","1950년","1960년","1979년"],ans:2,exp:"4·19 혁명은 1960년에 이승만 정부의 독재와 부정 선거에 항거하여 일어났습니다."},
  {q:"우리나라 헌법에서 국민이 직접 대통령을 뽑는 제도를 무엇이라 하는가?",opts:["간접 선거","직접 선거","비밀 선거","보통 선거"],ans:1,exp:"직접 선거는 국민이 직접 대표를 뽑는 선거 방식으로, 우리나라 대통령 선거에 적용됩니다."},
  {q:"5·18 민주화 운동이 일어난 도시는?",opts:["서울","부산","광주","대전"],ans:2,exp:"5·18 민주화 운동은 1980년 광주에서 신군부의 독재에 맞서 일어난 민주화 운동입니다."},
  {q:"국민이 나라의 중요한 일을 스스로 결정하는 민주주의 원리와 가장 관련 깊은 것은?",opts:["선거","독재","왕정","신분제"],ans:0,exp:"선거는 국민이 대표를 선출하여 스스로 나라의 일을 결정하는 민주주의의 핵심 수단입니다."},
  {q:"우리나라 헌법을 수호하고 헌법에 관한 분쟁을 판단하는 기관은?",opts:["대법원","헌법재판소","국회","검찰"],ans:1,exp:"헌법재판소는 헌법 관련 분쟁을 판단하고 국민의 기본권을 보장하는 기관입니다."},
  {q:"6월 민주 항쟁(1987년)의 결과로 이루어진 것은?",opts:["5·16 군사 정변","대통령 직선제 개헌","남북 분단","6·25 전쟁"],ans:1,exp:"6월 민주 항쟁의 결과 대통령 직선제 개헌이 이루어졌고, 민주주의 발전의 전환점이 되었습니다."},
  {q:"민주주의 선거의 4대 원칙이 아닌 것은?",opts:["보통 선거","평등 선거","직접 선거","지역 선거"],ans:3,exp:"민주주의 선거의 4대 원칙은 보통·평등·직접·비밀 선거입니다."},
  {q:"국회의 가장 중요한 역할은?",opts:["법률 제정","세금 징수","군대 지휘","외교 활동"],ans:0,exp:"국회의 가장 중요한 역할은 법률을 만들거나 고치는 법률 제정입니다."},
  {q:"권력이 한 사람이나 기관에 집중되는 것을 막기 위해 국가 권력을 나누는 원리는?",opts:["국민 주권","권력 분립","기본권 보장","다수결 원칙"],ans:1,exp:"권력 분립은 국가 권력을 입법·사법·행정으로 나누어 권력 남용을 막는 원리입니다."},
  {q:"우리나라 국회의원의 임기는 몇 년인가?",opts:["2년","4년","5년","6년"],ans:1,exp:"우리나라 국회의원의 임기는 4년입니다."},
  {q:"다음 중 기본권의 종류가 아닌 것은?",opts:["자유권","평등권","참정권","독점권"],ans:3,exp:"기본권에는 자유권, 평등권, 참정권, 사회권, 청구권 등이 있으며 독점권은 해당하지 않습니다."},
  {q:"이승만 정부의 독재와 부정 선거에 항거하여 학생과 시민이 일으킨 혁명은?",opts:["3·1 운동","4·19 혁명","5·18 민주화 운동","6월 민주 항쟁"],ans:1,exp:"4·19 혁명(1960)은 이승만 정부의 3·15 부정 선거에 항거한 혁명입니다."},
  {q:"우리나라 대통령의 임기는 몇 년인가?",opts:["4년","5년","6년","7년"],ans:1,exp:"우리나라 대통령의 임기는 5년이며 중임이 불가합니다."},
  {q:"법 앞에 모든 국민이 동등하게 대우받아야 한다는 기본권은?",opts:["자유권","평등권","사회권","참정권"],ans:1,exp:"평등권은 성별·종교·신분에 관계없이 법 앞에 동등하게 대우받을 권리입니다."},
  {q:"전두환 신군부의 독재에 맞서 1980년 광주에서 일어난 민주화 운동은?",opts:["4·19 혁명","5·16 군사 정변","5·18 민주화 운동","6월 민주 항쟁"],ans:2,exp:"5·18 민주화 운동은 1980년 5월 광주에서 신군부에 맞서 일어난 민주화 운동입니다."},
  {q:"국민이 선거를 통해 나라의 정치에 직접 참여하는 권리는?",opts:["자유권","사회권","참정권","청구권"],ans:2,exp:"참정권은 선거권·피선거권 등 국민이 국가 정치에 참여할 수 있는 권리입니다."},
  {q:"민주주의에서 의사 결정 방법으로 가장 많이 사용하는 원칙은?",opts:["만장일치","다수결 원칙","소수결","제비뽑기"],ans:1,exp:"다수결 원칙은 과반수 이상의 의견에 따라 결정하는 민주주의의 대표적 방식입니다."},
  {q:"헌법에서 국민에게 보장하는 권리로서 국가 권력도 침해할 수 없는 것은?",opts:["의무","기본권","법률","규칙"],ans:1,exp:"기본권은 헌법이 보장하는 국민의 기본적 권리로, 국가도 함부로 침해할 수 없습니다."},
  {q:"민주주의 발전을 위해 국민이 가져야 할 자세로 알맞지 않은 것은?",opts:["선거에 적극 참여한다","정치에 무관심하다","비판적으로 생각한다","다양한 의견을 존중한다"],ans:1,exp:"민주주의 발전을 위해 국민은 정치에 관심을 갖고 적극적으로 참여해야 합니다."}
];

let studentName='', className='', cur=0, answered=[], startTime=null;

function startQuiz(){
  studentName = document.getElementById('name-input').value.trim();
  className = document.getElementById('class-input').value;
  if(!studentName){alert('이름을 입력해주세요.'); return;}
  if(!className){alert('반을 선택해주세요.'); return;}
  startTime = new Date();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('name-display').textContent = className+' '+studentName;
  render();
}

function render(){
  const q = QS[cur];
  document.getElementById('q-num').textContent = '문제 '+(cur+1);
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-count').textContent = (cur+1)+' / 20';
  document.getElementById('pbar').style.width = ((cur+1)/20*100)+'%';
  const opts = document.getElementById('opts');
  opts.innerHTML='';
  const fb = document.getElementById('fb');
  fb.className='feedback-box'; fb.textContent='';
  const picked = answered[cur];
  q.opts.forEach((o,i)=>{
    const b = document.createElement('button');
    b.className = 'opt'+(picked!==undefined?' disabled':'');
    if(picked!==undefined){
      if(i===q.ans) b.classList.add('correct');
      else if(i===picked) b.classList.add('wrong');
    }
    b.innerHTML = `<span class="opt-num">${i+1}</span>${o}`;
    if(picked===undefined) b.onclick = ()=>choose(i);
    opts.appendChild(b);
  });
  if(picked!==undefined){
    fb.className = 'feedback-box show '+(picked===q.ans?'correct':'wrong');
    fb.textContent = (picked===q.ans?'✓ 정답! ':'✗ 오답. 정답: '+q.opts[q.ans]+'. ')+'해설: '+q.exp;
  }
  document.getElementById('prev-btn').disabled = cur===0;
  const nb = document.getElementById('next-btn');
  nb.textContent = cur===19 ? '결과 제출 ✓' : '다음 →';
}

function choose(i){ answered[cur]=i; render(); }

function go(d){
  if(d===1 && cur===19){ showResult(); return; }
  cur = Math.max(0,Math.min(19,cur+d));
  render();
}

async function showResult(){
  const unanswered = QS.map((_,i)=>i).filter(i=>answered[i]===undefined);
  if(unanswered.length>0){
    if(!confirm(`아직 ${unanswered.length}문제를 풀지 않았습니다. 그래도 제출할까요?`)) return;
  }
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const correct = answered.filter((a,i)=>a===QS[i].ans).length;
  const pct = Math.round(correct/20*100);
  document.getElementById('res-name').textContent = className+' '+studentName;
  document.getElementById('res-score').textContent = correct;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = 20-correct;
  document.getElementById('stat-pct').textContent = pct+'점';
  let msg = pct>=90?'🎉 훌륭해요! 완벽에 가깝습니다.':pct>=70?'👍 잘했어요! 조금만 더 복습해요.':pct>=50?'📖 조금 더 공부가 필요해요.':'💪 포기하지 말고 다시 도전해 봐요!';
  document.getElementById('res-msg').textContent = msg;
  const wrongItems = QS.map((q,i)=>({q,i,picked:answered[i]})).filter(({q,i,picked})=>picked!==q.ans);
  const ws = document.getElementById('wrong-section');
  if(wrongItems.length===0){ ws.innerHTML='<div style="text-align:center;padding:1rem;color:var(--green);font-weight:700">🎊 오답이 없습니다! 완벽해요!</div>'; }
  else {
    ws.innerHTML = `<div class="wrong-title">오답노트 (${wrongItems.length}문제)</div>`+
      wrongItems.map(({q,i,picked})=>`
        <div class="wrong-item">
          <div class="wrong-q">문제 ${i+1}. ${q.q}</div>
          <div class="wrong-ans">
            <span class="wrong-my">✗ 내 답: ${picked!==undefined?q.opts[picked]:'(미응답)'}</span>
            <span class="wrong-correct">✓ 정답: ${q.opts[q.ans]}</span>
          </div>
          <div class="wrong-exp">💡 ${q.exp}</div>
        </div>`).join('');
  }
  document.getElementById('submit-msg').textContent = '결과를 저장하는 중...';
  try {
    await sb.from('quiz_sessions').insert({
      student_name: studentName,
      class_name: className,
      score: correct,
      total: 20,
      answers: answered.map((a,i)=>({q:i,picked:a??null,correct:a===QS[i].ans}))
    });
    document.getElementById('submit-msg').textContent = '✅ 결과가 선생님께 전송되었습니다.';
  } catch(e) {
    document.getElementById('submit-msg').textContent = '⚠️ 저장 중 오류가 발생했습니다.';
  }
}
</script>
</body>
</html>
